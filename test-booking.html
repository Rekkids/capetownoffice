<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Booking Test | Cape Town Office</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --orange: #E8860A; --charcoal: #2d2d2d; --mid: #6b6b6b; --bg: #F7F5F0; --white: #FFFFFF; --rule: #E0DDD6; }
body { font-family: 'Titillium Web', Helvetica, Arial, sans-serif; background: var(--bg); color: var(--charcoal); padding: 24px; }
.test-banner { background: var(--charcoal); color: var(--white); padding: 12px 20px; border-radius: 8px; font-size: 0.85rem; margin-bottom: 32px; }
.test-banner strong { color: var(--orange); }
h1 { font-size: 1.4rem; margin-bottom: 4px; }
.section { max-width: 720px; margin: 0 auto 56px; }
.section-label { font-size: 0.68rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--orange); margin-bottom: 8px; display: block; }
.section h2 { font-size: 1.2rem; margin-bottom: 16px; }
.embed-wrap { background: var(--white); border: 1px solid var(--rule); border-radius: 12px; overflow: hidden; min-height: 500px; }
</style>
</head>
<body>

<div class="test-banner">
  <strong>Test page</strong> — not linked in navigation. For internal testing only, not indexed by search engines.
</div>

<div class="section">
  <span class="section-label">Test 1</span>
  <h1>Book a Viewing</h1>
  <div class="embed-wrap">
    <!-- Cal inline embed code begins -->
    <div style="width:100%;height:100%;overflow:scroll" id="my-cal-inline-viewing"></div>
    <script type="text/javascript">
      (function (C, A, L) { let p = function (a, ar) { a.q.push(ar); }; let d = C.document; C.Cal = C.Cal || function () { let cal = C.Cal; let ar = arguments; if (!cal.loaded) { cal.ns = {}; cal.q = cal.q || []; d.head.appendChild(d.createElement("script")).src = A; cal.loaded = true; } if (ar[0] === L) { const api = function () { p(api, arguments); }; const namespace = ar[1]; api.q = api.q || []; if(typeof namespace === "string"){cal.ns[namespace] = cal.ns[namespace] || api;p(cal.ns[namespace], ar);p(cal, ["initNamespace", namespace]);} else p(cal, ar); return;} p(cal, ar); }; })(window, "https://app.cal.eu/embed/embed.js", "init");
    Cal("init", "viewing", {origin:"https://app.cal.eu"});
    Cal.config = Cal.config || {};
    Cal.config.forwardQueryParams = true;
      Cal.ns.viewing("inline", {
        elementOrSelector:"#my-cal-inline-viewing",
        config: {"layout":"month_view","useSlotsViewOnSmallScreen":"true"},
        calLink: "cape-town-office/viewing",
      });
      Cal.ns.viewing("ui", {"hideEventTypeDetails":false,"layout":"month_view"});
      </script>
      <!-- Cal inline embed code ends -->
  </div>
</div>

<div class="section">
  <span class="section-label">Test 2</span>
  <h1>Day Pass</h1>
  <div class="embed-wrap">
    <!-- Cal inline embed code begins -->
    <div style="width:100%;height:100%;overflow:scroll" id="my-cal-inline-daypass"></div>
    <script type="text/javascript">
      (function (C, A, L) { let p = function (a, ar) { a.q.push(ar); }; let d = C.document; C.Cal = C.Cal || function () { let cal = C.Cal; let ar = arguments; if (!cal.loaded) { cal.ns = {}; cal.q = cal.q || []; d.head.appendChild(d.createElement("script")).src = A; cal.loaded = true; } if (ar[0] === L) { const api = function () { p(api, arguments); }; const namespace = ar[1]; api.q = api.q || []; if(typeof namespace === "string"){cal.ns[namespace] = cal.ns[namespace] || api;p(cal.ns[namespace], ar);p(cal, ["initNamespace", namespace]);} else p(cal, ar); return;} p(cal, ar); }; })(window, "https://app.cal.eu/embed/embed.js", "init");
    Cal("init", "daypass", {origin:"https://app.cal.eu"});
    Cal.config = Cal.config || {};
    Cal.config.forwardQueryParams = true;
      Cal.ns.daypass("inline", {
        elementOrSelector:"#my-cal-inline-daypass",
        config: {"layout":"month_view","useSlotsViewOnSmallScreen":"true"},
        calLink: "cape-town-office/daypass",
      });
      Cal.ns.daypass("ui", {"hideEventTypeDetails":false,"layout":"month_view"});
      </script>
      <!-- Cal inline embed code ends -->
  </div>
</div>

<script type="text/javascript">
  // Test: confirm redirect fires correctly for both event types
  Cal.ns.viewing("on", {
    action: "bookingSuccessfulV2",
    callback: function (e) {
      alert("Viewing booking confirmed — would redirect to /thank-you now.");
      // window.location.href = "/thank-you";
    }
  });
  Cal.ns.daypass("on", {
    action: "bookingSuccessfulV2",
    callback: function (e) {
      alert("Day Pass booking confirmed — would redirect to /thank-you now.");
      // window.location.href = "/thank-you";
    }
  });
</script>

</body>
</html>
